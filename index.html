<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;0,800;1,400;1,700;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <title>Frontend Mentor | Age calculator app</title>
</head>
<body class="d-flex flex-column justify-content-center align-items-center vh-100 p-3">

    <main class="container">
        <div class="age-calculator-card bg-white p-4 p-md-5 rounded-4 shadow-lg mx-auto">
            
            <form id="age-form" class="row border-bottom pb-5 pb-md-4 mb-4 position-relative">
                <div class="col-4 col-md-3">
                    <label for="day-input" class="form-label text-uppercase fw-bold">Day</label>
                    <input type="number" class="form-control fw-bold" id="day-input" placeholder="DD" min="1" max="31">
                    <div class="invalid-feedback" id="day-error"></div>
                </div>

                <div class="col-4 col-md-3">
                    <label for="month-input" class="form-label text-uppercase fw-bold">Month</label>
                    <input type="number" class="form-control fw-bold" id="month-input" placeholder="MM" min="1" max="12">
                    <div class="invalid-feedback" id="month-error"></div>
                </div>

                <div class="col-4 col-md-3">
                    <label for="year-input" class="form-label text-uppercase fw-bold">Year</label>
                    <input type="number" class="form-control fw-bold" id="year-input" placeholder="YYYY" min="1970" max="2025">
                    <div class="invalid-feedback" id="year-error"></div>
                </div>

                <div class="col-12 submit-button-wrapper">
                    <button type="submit" class="btn btn-purple-circle rounded-circle p-2 p-md-4 shadow">
                      <img src="./assets/images/icon-arrow.svg"  width="40" height="40" alt="">
                    </button>
                </div>
            </form>

            <div class="results-display pt-4 pt-md-0">
                <h1 class="display-1 fw-bolder fst-italic">
                    <span id="result-years" class="text-purple">--</span> years
                </h1>
                <h1 class="display-1 fw-bolder fst-italic">
                    <span id="result-months" class="text-purple">--</span> months
                </h1>
                <h1 class="display-1 fw-bolder fst-italic">
                    <span id="result-days" class="text-purple">--</span> days
                </h1>
            </div>

        </div>
    </main>

    <footer class="mt-4">
        <div class="attribution">
            Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
            Coded by <a href="https://www.frontendmentor.io/profile/m-92-h">Mohamed</a>.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
